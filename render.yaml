services:
  - type: web
    name: brush-up-salon
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_GEMINI_API_KEY
        sync: false
      - key: REACT_APP_GROQ_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
